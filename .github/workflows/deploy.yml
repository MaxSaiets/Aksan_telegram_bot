name: Deploy Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy on server
        shell: powershell
        run: |
          $projectRoot = if ($env:DEPLOY_PROJECT_ROOT) {
            $env:DEPLOY_PROJECT_ROOT
          } else {
            'C:\bots\telegram_aksan_bot'
          }

          if (-not (Test-Path $projectRoot)) {
            throw "Project root not found: $projectRoot"
          }

          Set-Location $projectRoot
          .\deploy.ps1
