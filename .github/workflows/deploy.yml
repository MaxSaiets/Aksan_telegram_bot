name: Deploy Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy on server
        shell: powershell
        run: |
          $projectRoot = if ($env:DEPLOY_PROJECT_ROOT) {
            $env:DEPLOY_PROJECT_ROOT
          } else {
            'C:\bots\telegram_aksan_bot'
          }

          $deployScript = Join-Path $projectRoot 'deploy.ps1'
          if (-not (Test-Path $deployScript)) {
            throw "deploy.ps1 not found: $deployScript"
          }

          & $deployScript
